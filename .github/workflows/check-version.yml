name: Check for New Upstream Release

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version from latest tag
        id: current
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          # Strip .postN suffix to get the upstream version
          VERSION=$(echo "${TAG#v}" | sed 's/\.post[0-9]*//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Current upstream version (from tag): ${VERSION}"

      - name: Check npm for latest version
        id: latest
        run: |
          LATEST=$(curl -sf https://registry.npmjs.org/agent-browser/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          echo "version=${LATEST}" >> $GITHUB_OUTPUT
          echo "Latest npm version: ${LATEST}"

      - name: Compare versions
        id: compare
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LATEST="${{ steps.latest.outputs.version }}"

          IS_NEWER=$(python3 -c "
          c = tuple(map(int, '$CURRENT'.split('.')))
          l = tuple(map(int, '$LATEST'.split('.')))
          print('true' if l > c else 'false')
          ")

          if [ "$IS_NEWER" = "true" ]; then
            # Guard against race condition: check tag doesn't already exist
            if git rev-parse "v${LATEST}" >/dev/null 2>&1; then
              echo "has_new_version=false" >> $GITHUB_OUTPUT
              echo "Tag v${LATEST} already exists, skipping."
            else
              echo "has_new_version=true" >> $GITHUB_OUTPUT
              echo "New version available: ${LATEST} > ${CURRENT}"
            fi
          else
            echo "has_new_version=false" >> $GITHUB_OUTPUT
            echo "Up to date."
          fi

      - name: Create and push tag
        if: steps.compare.outputs.has_new_version == 'true'
        run: |
          VERSION="${{ steps.latest.outputs.version }}"
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git tag -a "v${VERSION}" -m "agent-browser ${VERSION}"
          git push "https://${{ secrets.GH_PAT }}@github.com/${GITHUB_REPOSITORY}.git" "v${VERSION}"
          echo "::notice::Created tag v${VERSION} for agent-browser update"
